spring:
    config:
        import: optional:file:.env[.properties]
    application:
        name: darak

    datasource:
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
        username: ${DB_USER}
        password: ${DB_PASS}
        pbkdf2_pepper: ${PBKDF2_PEPPER}